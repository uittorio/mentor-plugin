name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  tests:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.os }}-${{ hashFiles('mcp/sm2/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Test
        run: cargo test --bins
        working-directory: mcp/sm2

  # ── 1. Build Rust binaries ─────────────────────────────────────────────────
  build:
    needs: tests
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mentor-mcp-linux-x86_64
            binary: sm2
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mentor-mcp-darwin-arm64
            binary: sm2

    steps:
      - uses: actions/checkout@v6

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mcp/sm2/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('mcp/sm2/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: mcp/sm2

      - name: Rename binary
        run: cp mcp/sm2/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  e2e_tests:
    needs: build
    name: E2e Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mentor-mcp-linux-x86_64
          - os: macos-latest
            artifact: mentor-mcp-darwin-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.os }}-${{ hashFiles('mcp/sm2/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: mcp/sm2

      - name: Test
        run: BINARY_PATH=${{ matrix.artifact }} cargo test --test e2e
        working-directory: mcp/sm2

  # ── 2. Release + publish plugin branch (tags only) ─────────────────────────
  publish:
    name: Publish
    needs: e2e_tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to claude-plugin-release
        run: |
          if git ls-remote --exit-code origin claude-plugin-release; then
            git fetch origin claude-plugin-release
            git worktree add /tmp/claude-branch claude-plugin-release
          else
            git worktree add --orphan -b claude-plugin-release /tmp/claude-branch
          fi

          rm -rf /tmp/claude-branch/*
          cp -r claude-plugin/. /tmp/claude-branch/
          cp scripts/mcp-server.sh /tmp/claude-branch/mcp-server.sh

          cd /tmp/claude-branch
          git add .
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "chore: publish plugin ${GITHUB_REF_NAME}"
          git push origin claude-plugin-release

      - name: Push to opencode-plugin-release
        run: |
          if git ls-remote --exit-code origin opencode-plugin-release; then
            git fetch origin opencode-plugin-release
            git worktree add /tmp/opencode-branch opencode-plugin-release
          else
            git worktree add --orphan -b opencode-plugin-release /tmp/opencode-branch
          fi

          rm -rf /tmp/opencode-branch/*
          cp -r opencode-plugin/. /tmp/opencode-branch/
          mkdir -p /tmp/opencode-branch/agent-mentor
          cp scripts/mcp-server.sh /tmp/opencode-branch/agent-mentor/mcp-server.sh

          cd /tmp/opencode-branch
          git add .
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "chore: publish plugin ${GITHUB_REF_NAME}"
          git push origin opencode-plugin-release
